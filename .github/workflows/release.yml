name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 允许手动触发，用于测试

permissions:
  contents: write  # 需要写权限才能创建 Release

jobs:
  build-windows:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm DingTalkMentions.spec

      - name: Rename artifact with version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -eq "") { $tag = "dev" }
          Rename-Item -Path "dist/DingTalkMentions.exe" -NewName "DingTalkMentions-$tag-windows-amd64.exe"

      - name: Upload artifact (for workflow_dispatch)
        uses: actions/upload-artifact@v4
        with:
          name: DingTalkMentions-windows
          path: dist/*.exe
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
